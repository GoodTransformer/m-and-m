name: Deploy to GitHub Pages

# The app now needs server rendering (Astro + Vercel adapter); a static GitHub
# Pages build would publish a BROKEN copy (no /admin, no RSVP action). The
# automatic push trigger is disabled — run manually only if you need the old
# static export. Remove this workflow once the Vercel cutover is complete.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        env:
          # Project pages serve under /<repo>/ — make the base path match the repo
          # name, and point `site` at the github.io origin. Both are read by
          # astro.config.mjs.
          BASE_PATH: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
